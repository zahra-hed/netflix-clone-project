name: Deploy to GitHub Pages

# When should this run?
on:
  push:
    branches: [ "main" ]  # Runs when you push to main branch
  workflow_dispatch:       # Also allows manual trigger

# What permissions does it need?
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest  # Uses a fresh Linux environment
    
    steps:
      # 1. Download your source code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # 2. Install Node.js (needed for npm)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Use your project's Node version
      
      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci  # 'ci' is faster and stricter than 'install'
      
      # 4. Build the project
      - name: Build project
        run: npm run build  # This creates dist/ or build/ folder
        env:
          CI: false

        
      # 5. Upload the built files
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build 
      
      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
